<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理員控制台 — 你畫我猜</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --primary: #3b82f6; --accent: #a855f7;
    --red: #ef4444; --green: #22c55e; --yellow: #eab308; --text: #f8fafc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; display: flex; height: 100vh; overflow: hidden; }
  
  .panel { width: 360px; background: var(--surface); padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; border-right: 1px solid #334155; }
  .panel-title { font-size: 1.5rem; font-weight: 900; color: var(--accent); display: flex; align-items: center; justify-content: space-between; }
  
  .card { background: rgba(0,0,0,0.2); border: 1px solid #334155; border-radius: 12px; padding: 16px; }
  .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; color: #cbd5e1; }
  
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; color: #fff; transition: opacity 0.2s; margin-bottom: 8px; }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  
  .btn-primary { background: var(--primary); }
  .btn-accent { background: var(--accent); }
  .btn-success { background: var(--green); }
  .btn-danger { background: var(--red); }
  .btn-warning { background: var(--yellow); color: #000; }
  .btn-outline { background: transparent; border: 1px solid #64748b; }
  
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .player-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
  .player-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; }
  .kick-btn { background: rgba(239,68,68,0.2); color: var(--red); border: 1px solid var(--red); border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 0.8rem; }

  .workspace { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; }
  .toolbar { display: flex; align-items: center; gap: 16px; background: var(--surface); padding: 16px; border-radius: 12px; }
  .tool-group { display: flex; align-items: center; gap: 8px; }
  
  .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
  .color-btn.active { border-color: #fff; transform: scale(1.1); }
  input[type=range] { width: 100px; }
  select { background: #0f172a; color: #fff; border: 1px solid #334155; padding: 8px; border-radius: 6px; font-size: 1rem; }

  .canvas-container { flex: 1; background: #fff; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
  canvas { cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
  
  #aiLoading { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; display: none; }
  .spinner { width: 50px; height: 50px; border: 5px solid rgba(168,85,247,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; background: #334155; }
</style>
</head>
<body>

<div class="panel">
  <div class="panel-title">
    🎮 控制台 <span id="connStatus" class="status-badge" style="background:var(--red)">未連線</span>
  </div>

  <div class="card">
    <div class="card-title">1. 題目管理</div>
    <input type="file" id="csvFile" accept=".csv" style="margin-bottom:8px; width:100%; color:#888;">
    <button class="btn btn-outline" onclick="uploadCSV()">上傳題庫 (CSV)</button>
    <div id="qStatus" style="font-size:0.85rem; color:var(--green); margin-top:8px;"></div>
  </div>

  <div class="card">
    <div class="card-title">2. 遊戲進度控制</div>
    <div style="font-size:0.9rem; color:#cbd5e1; margin-bottom:12px;">
      目前狀態：<span id="gameStatusLabel" style="color:var(--accent); font-weight:700;">等待中</span><br>
      目前題目：<span id="qProgressLabel">- / -</span>
    </div>
    
    <button class="btn btn-primary" onclick="socket.emit('admin_start_game')">▶️ 開始遊戲 (第一題)</button>
    <button class="btn btn-success" onclick="socket.emit('admin_open_answer')">🔓 開放手機答題 (20秒)</button>
    <button class="btn btn-outline" onclick="socket.emit('admin_show_result')">📊 提前公布解答</button>
    
    <div class="grid-2" style="margin-top:8px;">
      <button class="btn btn-accent" onclick="socket.emit('admin_next_question')">⏭️ 下一題</button>
      <button class="btn btn-warning" onclick="socket.emit('admin_show_rank_points')">🏅 顯示名次積分</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">大螢幕顯示切換</div>
    <div class="grid-2">
      <button class="btn btn-outline" onclick="socket.emit('admin_switch_image', {mode:'canvas'})">🖌️ 顯示原圖</button>
      <button class="btn btn-outline" onclick="socket.emit('admin_switch_image', {mode:'ai'})">✨ 顯示 AI 圖</button>
    </div>
  </div>

  <div class="card" style="flex:1;">
    <div class="card-title">參賽者名單 (<span id="pCount">0</span>)</div>
    <div class="player-list" id="playerList"></div>
  </div>

  <button class="btn btn-danger" onclick="resetGame()" style="margin-top:auto;">⚠️ 重置整個遊戲</button>
</div>

<div class="workspace">
  <div class="toolbar">
    <div class="tool-group">
      <div class="color-btn active" style="background:#000" onclick="setColor('#000', this)"></div>
      <div class="color-btn" style="background:#ef4444" onclick="setColor('#ef4444', this)"></div>
      <div class="color-btn" style="background:#3b82f6" onclick="setColor('#3b82f6', this)"></div>
      <div class="color-btn" style="background:#22c55e" onclick="setColor('#22c55e', this)"></div>
      <div class="color-btn" style="background:#eab308" onclick="setColor('#eab308', this)"></div>
      <div class="color-btn" style="background:#fff; border:1px solid #ccc;" onclick="setColor('#ffffff', this)" title="橡皮擦"></div>
    </div>
    <div style="width:1px; height:24px; background:#334155; margin:0 8px;"></div>
    <div class="tool-group">
      <span style="font-size:0.9rem;">粗細</span>
      <input type="range" id="brushSize" min="2" max="30" value="5">
    </div>
    <div style="width:1px; height:24px; background:#334155; margin:0 8px;"></div>
    <button class="btn btn-outline" style="width:auto; padding:8px 16px; margin:0;" onclick="clearCanvas()">🗑️ 清空畫布</button>
    
    <div style="margin-left:auto; display:flex; gap:8px;">
      <select id="aiStyle">
        <option value="realistic">📸 寫實照片</option>
        <option value="ghibli">🏡 吉卜力動畫</option>
        <option value="comic">💥 熱血漫畫</option>
        <option value="watercolor">💧 透明水彩</option>
        <option value="oil">🖼️ 經典油畫</option>
        <option value="scifi">🚀 賽博龐克</option>
      </select>
      <button class="btn btn-accent" style="width:auto; padding:8px 24px; margin:0;" onclick="generateAI()">✨ AI 魔法增強</button>
    </div>
  </div>

  <div class="canvas-container" id="canvasWrap">
    <canvas id="drawingCanvas" width="800" height="600"></canvas>
    <div id="aiLoading">
      <div class="spinner"></div>
      <div style="font-size:1.2rem; font-weight:700;">AI 排隊作畫中，請稍候...</div>
      <div id="aiLoadingText" style="color:#888; margin-top:8px; font-size:0.9rem;">依據伺服器狀況可能需要 15~40 秒不等</div>
    </div>
  </div>
</div>

<script>
const socket = io({ transports: ['websocket', 'polling'] });

socket.on('connect', () => {
  const badge = document.getElementById('connStatus');
  badge.textContent = '已連線'; badge.style.background = 'var(--green)';
});
socket.on('disconnect', () => {
  const badge = document.getElementById('connStatus');
  badge.textContent = '斷線中'; badge.style.background = 'var(--red)';
});

socket.on('game_state', data => updateUI(data));
socket.on('show_question', data => {
  document.getElementById('gameStatusLabel').textContent = '畫畫中';
  document.getElementById('qProgressLabel').textContent = `第 ${data.index+1} 題 / 共 ${data.total} 題`;
  clearCanvas(false); 
});
socket.on('start_answering', () => document.getElementById('gameStatusLabel').textContent = '答題中');
socket.on('show_result', () => document.getElementById('gameStatusLabel').textContent = '顯示解答');
socket.on('game_finished', () => document.getElementById('gameStatusLabel').textContent = '遊戲結束');
socket.on('game_reset', () => window.location.reload());

socket.on('participant_joined', data => renderPlayers(data.participants));
socket.on('participant_left', data => renderPlayers(data.participants));

function updateUI(data) {
  if (data.total_questions) {
    document.getElementById('qProgressLabel').textContent = `第 ${data.current_question+1} 題 / 共 ${data.total_questions} 題`;
  }
  renderPlayers(data.participants || []);
}

function renderPlayers(list) {
  document.getElementById('pCount').textContent = list.length;
  const sorted = [...list].sort((a, b) => parseInt(a.name) - parseInt(b.name));
  document.getElementById('playerList').innerHTML = sorted.map(p => `
    <div class="player-item">
      <span>${p.name} ${p.online===false ? '<span style="color:var(--red);font-size:0.8em">(離線)</span>':''}</span>
      <div style="display:flex; gap:12px; align-items:center;">
        <span style="font-family:monospace; color:var(--accent);">${p.score}分</span>
        <button class="kick-btn" onclick="kickPlayer('${p.name}')">踢出</button>
      </div>
    </div>
  `).join('');
}

function kickPlayer(name) {
  if (confirm(`確定要踢出 ${name} 嗎？`)) socket.emit('admin_kick', {name});
}

function uploadCSV() {
  const file = document.getElementById('csvFile').files[0];
  if (!file) return alert('請先選擇 CSV 檔案');
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    const questions = [];
    for (let i = 1; i < lines.length; i++) {
      const parts = lines[i].split(',').map(p => p.trim());
      if (parts.length >= 6) {
        questions.push({
          description: parts[0],
          options: [parts[1], parts[2], parts[3], parts[4]],
          correct: parts[5].toUpperCase()
        });
      }
    }
    if (questions.length === 0) return alert('解析失敗，請確認 CSV 格式是否正確');
    
    fetch('/api/upload_questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ questions })
    }).then(r => r.json()).then(res => {
      if (res.success) { document.getElementById('qStatus').textContent = `✅ 成功載入 ${res.count} 題！`; } 
      else { alert(res.error); }
    });
  };
  reader.readAsText(file);
}

function resetGame() {
  if (confirm('⚠️ 警告：這將會清除所有玩家的分數並強制所有人重新登入！確定要重置嗎？')) {
    fetch('/api/reset', { method:'POST' });
  }
}

const canvas = document.getElementById('drawingCanvas');
const ctx = canvas.getContext('2d');
let isDrawing = false;
let currentX = 0; let currentY = 0;
let brushColor = '#000000';
let brushSize = 5;
let lastEmitTime = 0;

ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);

function setColor(color, el) {
  brushColor = color;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
document.getElementById('brushSize').addEventListener('input', e => { brushSize = e.target.value; });

function clearCanvas(broadcast = true) {
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (broadcast) { socket.emit('clear_canvas'); emitCanvas(); }
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  let clientX = e.clientX; let clientY = e.clientY;
  if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function startDraw(e) {
  e.preventDefault(); isDrawing = true;
  const pos = getPos(e); currentX = pos.x; currentY = pos.y;
  ctx.beginPath(); ctx.fillStyle = brushColor; ctx.arc(currentX, currentY, brushSize/2, 0, Math.PI*2); ctx.fill();
}

function draw(e) {
  if (!isDrawing) return; e.preventDefault();
  const pos = getPos(e);
  ctx.beginPath(); ctx.moveTo(currentX, currentY); ctx.lineTo(pos.x, pos.y);
  ctx.strokeStyle = brushColor; ctx.lineWidth = brushSize; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
  currentX = pos.x; currentY = pos.y;

  const now = Date.now();
  if (now - lastEmitTime > 100) { emitCanvas(); lastEmitTime = now; }
}

function endDraw(e) {
  if (!isDrawing) return;
  isDrawing = false; emitCanvas();
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseout', endDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('touchmove', draw, {passive:false});
canvas.addEventListener('touchend', endDraw);

function emitCanvas() {
  const dataURL = canvas.toDataURL('image/webp', 0.5);
  socket.emit('drawing_update', { image: dataURL });
}

async function generateAI() {
  const loading = document.getElementById('aiLoading');
  const style = document.getElementById('aiStyle').value;
  const dataURL = canvas.toDataURL('image/jpeg', 0.8);
  
  loading.style.display = 'flex';

  try {
    const response = await fetch('/api/diffusion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: dataURL, style: style })
    });
    const result = await response.json();
    if (result.error) alert('產生失敗：' + result.error);
  } catch (err) {
    alert('發生錯誤：' + err);
  } finally {
    loading.style.display = 'none';
  }
}
</script>
</body>
</html>
