<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大螢幕展示 — 你畫我猜</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Bebas+Neue&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  /* 保留你原本的 CSS 變數與所有樣式 */
  :root { --red: #ef4444; --green: #22c55e; --yellow: #eab308; --blue: #3b82f6; --accent: #a855f7; --bg: #080810; --text: #f0f0ff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; height: 100vh; overflow: hidden; }
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
  .screen.hidden { opacity: 0; pointer-events: none; }
  
  /* ... (省略部分原本的 CSS，請保留你原有的 CSS) ... */

  /* 👇 雙畫面 CSS (已優化置中與比例) */
  .ans-top { flex: 0 0 44%; width: 100%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
  .ans-image { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  .dual-image-container { width: 100%; height: 100%; display: flex; flex-direction: row; gap: 4px; padding: 0 20px; }
  .image-half { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); border-radius: 12px; }
  .image-half img { max-width: 95%; max-height: 95%; object-fit: contain; }
  .image-label { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; border-radius: 20px; padding: 6px 16px; font-size: 1.1vw; font-weight: 700; border: 1px solid rgba(255,255,255,0.2); z-index: 10; }
  .ai-label { background: rgba(168,85,247,0.9); border-color: rgba(168,85,247,0.5); }

  /* 👇 最終排名的名單區塊 */
  #screenFinished { background: #050508; overflow-y: auto; justify-content: flex-start; padding-top: 4vh; }
  .finished-title { font-family: 'Bebas Neue', sans-serif; font-size: 5vw; color: var(--accent); text-shadow: 0 0 60px rgba(168,85,247,0.6); margin-bottom: 20px; position: relative; z-index: 1; transition: all 0.5s; }
  .final-podium { display: flex; align-items: flex-end; gap: 24px; position: relative; z-index: 1; margin-bottom: 30px; }
  .rest-ranking { width: 85vw; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; position: relative; z-index: 1; padding-bottom: 40px; }
  .rest-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
  .rest-rank-num { font-family: 'Space Mono', monospace; font-size: 1.2vw; color: #888; }
  .rest-name { font-weight: 700; font-size: 1.4vw; flex: 1; text-align: center; }
  .rest-score { font-family: 'Space Mono', monospace; font-size: 1.4vw; color: var(--accent); font-weight: 700; transition: color 0.5s; }
  .score-pop { animation: popScore 0.5s ease-out; color: var(--yellow) !important; }
  @keyframes popScore { 50% { transform: scale(1.3); } }
</style>
</head>
<body>

<div class="screen" id="screenWaiting">
  <div class="orbit"></div><div class="orbit orbit2"></div>
  <div class="waiting-title">你畫我猜</div>
  
  <img src="/static/game_qr.png" alt="Game QR Code" onerror="this.style.display='none'" style="width: 15vw; height: 15vw; border-radius: 16px; border: 4px solid var(--accent); box-shadow: 0 0 40px rgba(168,85,247,0.4); margin-bottom: 20px; z-index: 1;">
  <div style="font-size: 1.4vw; max-width: 60vw; text-align: center; line-height: 1.6; color: #ccc; margin-bottom: 30px; z-index: 1;">
    掃描上方 QR Code 並輸入桌號加入遊戲！<br>
    每題將會顯示原創畫作或 <span style="color: var(--accent); font-weight: bold;">AI 增強畫作</span>，請在時間內精準選出正確的題目！
  </div>

  <div class="participant-count" id="wCount">0 / 20 位參賽者</div>
  <div class="waiting-participants" id="wParticipants"></div>
</div>

<div class="screen hidden" id="screenAnswering" style="flex-direction:column;">
  <div class="ans-top" id="ansTop">
    <img class="ans-image" id="ansImage" src="" alt="" style="display:none;">
    <div class="dual-image-container" id="dualImageContainer" style="display:none;">
      <div class="image-half">
        <img id="ansImageCanvas" src="" alt="原始畫布">
        <div class="image-label">🖌️ 原始畫布</div>
      </div>
      <div class="image-half">
        <img id="ansImageAI" src="" alt="AI 增強">
        <div class="image-label ai-label" id="aiLabel">✨ AI 增強</div>
      </div>
    </div>
  </div>
  <div class="ans-q-label" id="ansQLabel"></div>
  <div class="timer-wrap">
    <div class="timer-bar-bg"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
    <div class="timer-num" id="timerNum">20</div>
  </div>
  <div class="options-grid" id="optionsGrid"></div>
</div>

<div class="screen hidden" id="screenFinished">
  <canvas class="firework" id="fireworkCanvas"></canvas>
  <div class="finished-title" id="finishedTitle">🎉 遊戲結束！</div>
  <div class="final-podium" id="finalPodium"></div>
  <div class="rest-ranking" id="restRanking"></div>
</div>

<script>
const socket = io({ transports: ['websocket', 'polling'] });
// ... (保留你原有的 socket.on 邏輯)

// 👇 優化後的雙畫面呈現邏輯
socket.on('start_answering', data => {
  showScreen('screenAnswering');
  document.getElementById('ansQLabel').textContent = data.description || '';
  
  const hasAI = data.has_ai && data.ai_image && data.canvas_image;
  const singleImg = document.getElementById('ansImage');
  const dualContainer = document.getElementById('dualImageContainer');
  
  if (hasAI) {
    singleImg.style.display = 'none';
    dualContainer.style.display = 'flex';
    document.getElementById('ansImageCanvas').src = data.canvas_image;
    document.getElementById('ansImageAI').src = data.ai_image;
  } else {
    singleImg.style.display = 'block';
    dualContainer.style.display = 'none';
    singleImg.src = data.image || '';
  }

  // ... (保留選項渲染與計時器邏輯)
});

// 👇 渲染所有 19 人名單的邏輯
function renderFinishedRanking(ranking, isRankPoints = false) {
  const top3 = ranking.slice(0, 3);
  const rest = ranking.slice(3, 19); // 顯示 4~19 名
  
  const podium = document.getElementById('finalPodium');
  const order = [top3[1], top3[0], top3[2]].filter(Boolean);
  const classes = ['second','first','third'];
  
  podium.innerHTML = order.map((p, i) => {
    const cls = classes[i];
    const scoreClass = isRankPoints ? 'score-pop' : '';
    const scoreText = isRankPoints ? `${p.score} 積分` : `${p.score} 分`;
    return `
      <div class="podium-item">
        <div class="podium-name">${p.name}</div>
        <div class="podium-score ${scoreClass}">${scoreText}</div>
        <div class="podium-block ${cls} ${cls==='first'?'blink':''}">${['🥈','🥇','🥉'][i]}</div>
      </div>`;
  }).join('');

  const restContainer = document.getElementById('restRanking');
  restContainer.innerHTML = rest.map((p, i) => {
    const rankNum = i + 4; // 從第 4 名開始
    const scoreClass = isRankPoints ? 'score-pop' : '';
    const scoreText = isRankPoints ? `${p.score} 積分` : `${p.score} 分`;
    return `
      <div class="rest-item">
        <span class="rest-rank-num">#${rankNum}</span>
        <span class="rest-name">${p.name}</span>
        <span class="rest-score ${scoreClass}">${scoreText}</span>
      </div>`;
  }).join('');
}

socket.on('game_finished', data => {
  showScreen('screenFinished');
  document.getElementById('finishedTitle').textContent = '🎉 遊戲結束！原始分數';
  renderFinishedRanking(data.ranking, false);
  startFireworks();
});

// 👇 接收後端算好的名次積分並更新畫面
socket.on('show_rank_points_screen', data => {
  document.getElementById('finishedTitle').textContent = '🏆 最終名次積分表';
  renderFinishedRanking(data.ranking, true);
});
</script>
</body>
</html>
